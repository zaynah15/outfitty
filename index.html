function getSubtypeEligibility(subtype, bucketId) {
  if (!subtype) return 0.5;
  const lower = subtype.toLowerCase();
  
  // Check keyword boosts first (highest priority - most specific)
  for (const [kw, scores] of Object.entries(SUBTYPE_KEYWORD_BOOSTS)) {
    if (lower.includes(kw)) {
      if (kw === 'ethnic' && lower.includes('ethnic')) {
        // Hard block ethnic items from streetwear
        if (bucketId === 'streetwear') return 0;
      }
      if (scores[bucketId] !== undefined) return scores[bucketId];
    }
  }
  
  // Fallback: use BASE scores by category inference
  // Tops: generally versatile
  if (['t-shirt','graphic tee','crop top','tank top','cami','tube top'].includes(lower)) {
    return {office:0.1,party:0.5,casual:0.95,coffee_date:0.6,date_night:0.3,summer_picnic:0.9,streetwear:0.85,minimalist:0.7,feminine:0.4,edgy:0.5,ethnic:0}[bucketId] ?? 0.5;
  }
  if (['blouse','wrap top','peplum top','sweetheart neck top','cowl neck top'].some(s=>lower.includes(s.split(' ')[0]))) {
    return {office:0.8,party:0.6,casual:0.6,coffee_date:0.9,date_night:0.7,summer_picnic:0.5,streetwear:0.1,minimalist:0.7,feminine:0.95,edgy:0.1,ethnic:0}[bucketId] ?? 0.5;
  }
  
  return BASE_BUCKET_SCORE[bucketId] ?? 0.5;
}

// Get material boost for a specific item+bucket
function getMaterialBoost(item, bucketId) {
  if (!item || !item.material) return 1.0;
  const matBoost = MATERIAL_BOOSTS[item.material];
  if (!matBoost) return 1.0;
  if (matBoost[bucketId] !== undefined) {
    // Return as multiplier: 0=blocked, 1=no change, >1=boost
    return matBoost[bucketId] === 0 ? 0 : (0.5 + matBoost[bucketId] * 0.8);
  }
  return 1.0;
}

// ═══════════════════════════════════════════════════════════
// SILHOUETTE HARMONY
// ═══════════════════════════════════════════════════════════
const SILHOUETTE_SCORES = {
  "Oversized":    {default:10,"Fitted / Slim":20,"Bodycon / Tight":20,"Regular / Classic":16,"A-Line / Flared":18,"Boxy":-5},
  "Boxy":         {default:10,"Fitted / Slim":15,"Bodycon / Tight":15,"Regular / Classic":12,"Boxy":-5},
  "Fitted / Slim":{default:10,"Flowy / Loose":20,"A-Line / Flared":20,"Oversized":18,"Regular / Classic":14},
  "Cropped":      {default:10,"Flowy / Loose":20,"A-Line / Flared":20,"Regular / Classic":16,"Oversized":18},
  "Flowy / Loose":{default:10,"Fitted / Slim":20,"Regular / Classic":16,"Structured":15},
  "Structured":   {default:10,"Flowy / Loose":20,"Regular / Classic":15,"Fitted / Slim":14},
  "Regular / Classic":{default:14,"Regular / Classic":14,"Fitted / Slim":16,"Flowy / Loose":16,"A-Line / Flared":16},
  "Bodycon / Tight":{default:8,"Oversized":18,"Relaxed":15},
  "Longline":     {default:12},
  "A-Line / Flared":{default:12},
};
function getSilhouetteScore(topFit, botFit) {
  if (!topFit || !botFit) return 12;
  const row = SILHOUETTE_SCORES[topFit];
  if (!row) return 12;
  return row[botFit] ?? row.default ?? 12;
}

// ═══════════════════════════════════════════════════════════
// COLOR HARMONY
// ═══════════════════════════════════════════════════════════
function colorScore(allItems) {
  const colorGroups = allItems.map(i=>COLORS.find(c=>c.name===i.color)?.group).filter(Boolean);
  if (colorGroups.length < 2) return 15;
  const vibrants = colorGroups.filter(g=>g!=="neutral"&&g!=="metallic");
  if (vibrants.length <= 1) return 20;
  let pairs=0, harmony=0;
  for (let i=0;i<colorGroups.length;i++) for (let j=i+1;j<colorGroups.length;j++) {
    const [ga,gb] = [colorGroups[i],colorGroups[j]];
    if (ga==="neutral"||gb==="neutral"||ga==="metallic"||gb==="metallic") harmony+=1;
    else if (ga===gb) harmony+=0.82;
    else if ((ga==="warm"&&gb==="cool")||(ga==="cool"&&gb==="warm")) harmony+=0.5;
    else if ((ga==="pink"&&gb==="cool")||(ga==="cool"&&gb==="pink")) harmony+=0.75;
    else harmony+=0.55;
    pairs++;
  }
  const neutralAccessory = allItems.some(i=>["Shoes","Bag"].includes(i.category)&&COLORS.find(c=>c.name===i.color)?.group==="neutral");
  const penalty = vibrants.length>2 && !neutralAccessory ? -5 : 0;
  return Math.round(Math.min(20,(harmony/pairs)*20)+penalty);
}

function patternScore(allItems) {
  const bold=["Floral (Large)","Animal Print","Plaid / Tartan","Tie-Dye","Graphic / Text","Abstract Print"];
  let boldCount=0, subtleCount=0, solidCount=0;
  allItems.forEach(i=>{
    if (!i.pattern||i.pattern==="Solid") solidCount++;
    else if (bold.includes(i.pattern)) boldCount++;
    else subtleCount++;
  });
  if (boldCount===0&&subtleCount===0) return 9;
  if (boldCount===1&&solidCount>=1) return 10;
  if (boldCount===0&&subtleCount<=2) return 8;
  if (boldCount>=2) return 3;
  if (boldCount===1&&subtleCount>=1) return 6;
  return 7;
}

function materialScore(allItems) {
  const mats = allItems.map(i=>i.material).filter(Boolean);
  if (mats.length<2) return 10;
  let total=0, pairs=0;
  for (let i=0;i<mats.length;i++) for (let j=i+1;j<mats.length;j++) {
    total += getMaterialScore(mats[i],mats[j]); pairs++;
  }
  return Math.round(Math.min(15,Math.max(0,total/pairs)));
}

function occasionScore(allItems, bucket) {
  if (!allItems.length) return 12;
  let total=0;
  allItems.forEach(i=>{
    const occ=(i.occasions||[]).filter(o=>bucket.occasions.includes(o)).length;
    total += Math.min(1, 0.3+occ*0.35);
  });
  return Math.round((total/allItems.length)*25);
}

function anchorBonus(allItems, bucketId) {
  const anchors = BUCKET_ANCHORS[bucketId]||[];
  return allItems.some(i=>anchors.includes(i.subtype)) ? 10 : 0;
}

function checkProhibitedMaterials(items, bucketId) {
  const prohibited = BUCKET_PROHIBITED_MATERIALS[bucketId]||[];
  return items.some(i=>prohibited.includes(i.material));
}

// ═══════════════════════════════════════════════════════════
// FULL SCORING — 100 POINTS + MATERIAL BOOST MULTIPLIER
// ═══════════════════════════════════════════════════════════
function fullScoreOutfit(outfit, bucket) {
  const coreItems = [outfit.top, outfit.bottom, outfit.dress].filter(Boolean);
  const allItems = [outfit.top, outfit.bottom, outfit.dress, outfit.outerwear, outfit.shoes, outfit.bag].filter(Boolean);
  if (!coreItems.length) return 0;

  // HARD BLOCK: subtype eligibility = 0
  for (const item of coreItems) {
    if (getSubtypeEligibility(item.subtype, bucket.id) === 0) return 0;
  }
  // HARD BLOCK: material incompatibility (e.g. Sequin in Office)
  for (const item of coreItems) {
    if (getMaterialBoost(item, bucket.id) === 0) return 0;
  }

  const top = outfit.top || outfit.dress;
  const bot = outfit.bottom;

  // BASE SCORE (100pts)
  const sil   = (top && bot) ? getSilhouetteScore(top.fit, bot.fit) : 12;
  const col   = colorScore(allItems);
  const mat   = materialScore(allItems);
  const pat   = patternScore(allItems);
  const occ   = occasionScore(allItems, bucket);
  const anch  = anchorBonus(allItems, bucket.id);
  const prohibPenalty = checkProhibitedMaterials(coreItems, bucket.id) ? -15 : 0;

  let baseScore = sil + col + mat + pat + occ + anch + prohibPenalty;

  // DATASET COMBO PRIORITY BOOST
  // If this exact top+bottom combo appears in our 242k-outfit dataset as popular for this bucket,
  // boost the score significantly
  let comboBoost = 0;
  if (top && bot) {
    const comboKey = `${top.subtype}|${bot.subtype}`;
    const altKey   = `${top.subtype}|${bot.subtype.replace(/[()]/g,'').trim()}`;
    const priority = COMBO_PRIORITY[comboKey]?.[bucket.id] || COMBO_PRIORITY[altKey]?.[bucket.id] || 0;
    if (priority > 0) {
      // Priority is 0-1, convert to up to +25 point boost
      comboBoost = Math.round(priority * 25);
    }
  }

  // MATERIAL BOOST MULTIPLIER
  const matBoosts = coreItems.map(i => getMaterialBoost(i, bucket.id));
  const matMult = matBoosts.reduce((a,b)=>a*b,1) ** (1/coreItems.length);

  // ELIGIBILITY MULTIPLIER
  const eligAvg = coreItems.reduce((s,i)=>s+getSubtypeEligibility(i.subtype,bucket.id),0)/coreItems.length;

  // Combined multiplier: material is the strongest signal for occasion
  const combined = (eligAvg * 0.35) + (matMult * 0.65);

  // Final: base * combined + comboBoost (combo boost is additive, not multiplied)
  const finalScore = Math.round(Math.min(100, Math.max(0, (baseScore * combined) + comboBoost)));
  return finalScore;
}
// ═══════════════════════════════════════════════════════════
// SCORE LABEL
// ═══════════════════════════════════════════════════════════
function scoreLabel(score) {
  if (score>=90) return "Perfect Match";
  if (score>=70) return "Recommended";
  if (score>=50) return "Experimental";
  return "Weak Match";
}

// SMART EXPLANATION GENERATOR
// ═══════════════════════════════════════════════════════════
function generateReason(outfit, bucket) {
  const vibe = BUCKET_VIBES[bucket.id] || {};

  const allItems = [outfit.top, outfit.bottom, outfit.dress, outfit.outerwear, outfit.shoes, outfit.bag].filter(Boolean);
  const top = outfit.top || outfit.dress;
  const bot = outfit.bottom;

  // Pick a verb from vibe
  const verbs = vibe.verbs || ["works beautifully"];
  const verb = verbs[Math.floor(Math.random() * verbs.length)];

  // Detect strongest signal
  const parts = [];

  // 1. Material story
  const glamMats = ["Sequin / Embellished","Satin","Silk","Velvet","Lace"];
  const casualMats = ["Denim","Jersey","Cotton","Linen"];
  const edgyMats = ["Leather","Faux Leather","Mesh"];
  const allMats = coreItems.map(i=>i.material).filter(Boolean);
  const hasGlam = allMats.some(m=>glamMats.includes(m));
  const hasDenim = allMats.some(m=>casualMats.includes(m));
  const hasEdgy = allMats.some(m=>edgyMats.includes(m));

  if (hasGlam) {
    const glamMat = allMats.find(m=>glamMats.includes(m));
    parts.push(`${glamMat} instantly elevates this to a ${vibe.mood || bucket.name} look.`);
  } else if (hasEdgy) {
    const edgyMat = allMats.find(m=>edgyMats.includes(m));
    parts.push(`${edgyMat} gives this a ${vibe.mood || bucket.name} attitude.`);
  } else if (hasDenim && (bucket.id==='casual'||bucket.id==='streetwear'||bucket.id==='coffee_date')) {
    parts.push(`Classic denim grounds this in effortless, everyday cool.`);
  }

  // 2. Silhouette insight
  if (top && bot) {
    const sil = getSilhouetteScore(top.fit, bot.fit);
    if (sil >= 18) {
      parts.push(`The ${top.fit?.toLowerCase() || 'relaxed'} top balances the ${bot.fit?.toLowerCase() || 'fitted'} bottom for a flattering silhouette.`);
    }
  }

  // 3. Combo recognition from dataset
  if (top && bot) {
    const comboKey = `${top.subtype}|${bot.subtype}`;
    const priority = COMBO_PRIORITY[comboKey]?.[bucket.id] || 0;
    if (priority >= 0.8) {
      parts.push(`This pairing is a top-trending combination for ${bucket.name} in 2025.`);
    }
  }

  // 4. Bucket-specific style note
  if (parts.length < 2 && vibe.style_note) {
    parts.push(vibe.style_note);
  }

  // 5. Bucket mood closer
  if (parts.length === 0) {
    parts.push(`This look ${verb} — perfect for ${bucket.name}.`);
  } else {
    parts.push(`This look ${verb}.`);
  }

  return parts.slice(0, 2).join(' ');
}
// ═══════════════════════════════════════════════════════════
// OUTFIT GENERATOR
// ═══════════════════════════════════════════════════════════
function generateOutfits(wardrobe, bucketId, count=8) {
  const bucket = STYLE_BUCKETS.find(b=>b.id===bucketId);
  if (!bucket||!wardrobe.length) return [];
  const rand = arr=>arr.length?arr[Math.floor(Math.random()*arr.length)]:null;
  const tops = wardrobe.filter(i=>i.category==="Top");
  const bottoms = wardrobe.filter(i=>i.category==="Bottom");
  const dresses = wardrobe.filter(i=>i.category==="Dress / Jumpsuit");
  const outers = wardrobe.filter(i=>i.category==="Outerwear");
  const shoes = wardrobe.filter(i=>i.category==="Shoes");
  const bags = wardrobe.filter(i=>i.category==="Bag");
  const all = [];
  tops.forEach(top=>bottoms.forEach(bottom=>{
    const outfit = {top,bottom,outerwear:rand(outers),shoes:rand(shoes),bag:rand(bags)};
    const score = fullScoreOutfit(outfit,bucket);
    all.push({...outfit,id:`${top.id}-${bottom.id}`,score,scoreLabel:scoreLabel(score),bucket,reason:generateReason(outfit,bucket)});
  }));
  dresses.forEach(dress=>{
    const outfit = {dress,outerwear:rand(outers),shoes:rand(shoes),bag:rand(bags)};
    const score = fullScoreOutfit(outfit,bucket);
    all.push({...outfit,id:`dress-${dress.id}`,score,scoreLabel:scoreLabel(score),bucket,reason:generateReason(outfit,bucket)});
  });
  // Only show outfits scoring at least 1 (filters out 0-eligibility combos)
  return all.filter(o=>o.score>0).sort((a,b)=>b.score-a.score).slice(0,count);
}

// ═══════════════════════════════════════════════════════════
// AUTH HOOK
// ═══════════════════════════════════════════════════════════
function useAuth() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    try{const u=localStorage.getItem("fitsy_user");if(u)setUser(JSON.parse(u));}catch{}
    setLoading(false);
  },[]);
  return{user,loading,
    login:(username,password)=>{
      const users=JSON.parse(localStorage.getItem("fitsy_users")||"[]");
      const match=users.find(u=>u.username===username&&u.password===password);
      if(!match)return{success:false,error:"Invalid username or password."};
      const u={id:match.id,username:match.username,displayName:match.displayName,avatar:match.avatar};
      setUser(u);localStorage.setItem("fitsy_user",JSON.stringify(u));
      return{success:true};
    },
    signup:(username,password,displayName)=>{
      const users=JSON.parse(localStorage.getItem("fitsy_users")||"[]");
      if(users.length>=50)return{success:false,error:"Fitsy is at capacity."};
      if(users.find(u=>u.username===username))return{success:false,error:"Username taken."};
      const u={id:Date.now().toString(),username,password,displayName:displayName||username,avatar:username.slice(0,2).toUpperCase()};
      users.push(u);localStorage.setItem("fitsy_users",JSON.stringify(users));
      const sess={id:u.id,username:u.username,displayName:u.displayName,avatar:u.avatar};
      setUser(sess);localStorage.setItem("fitsy_user",JSON.stringify(sess));
      return{success:true};
    },
    logout:()=>{setUser(null);localStorage.removeItem("fitsy_user");},
  };
}

// ═══════════════════════════════════════════════════════════
// WARDROBE HOOK
// ═══════════════════════════════════════════════════════════
function useWardrobe(userId) {
  const key=userId?`fitsy_wardrobe_${userId}`:null;
  const [wardrobe,setW]=useState([]);
  useEffect(()=>{
    if(!key){setW([]);return;}
    try{const d=localStorage.getItem(key);setW(d?JSON.parse(d):[]);}catch{setW([]);}
  },[key]);
  const save=useCallback(items=>{if(!key)return;localStorage.setItem(key,JSON.stringify(items));setW(items);},[key]);
  const addItem=useCallback(item=>{const n={...item,id:Date.now().toString(),addedAt:new Date().toISOString()};save([...wardrobe,n]);return n;},[wardrobe,save]);
  const removeItem=useCallback(id=>save(wardrobe.filter(i=>i.id!==id)),[wardrobe,save]);
  const updateItem=useCallback((id,upd)=>save(wardrobe.map(i=>i.id===id?{...i,...upd}:i)),[wardrobe,save]);
  return{wardrobe,addItem,removeItem,updateItem};
}

function isLight(hex){if(!hex)return true;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>128;}

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/9k=";
function AuthScreen({auth}){
  const[tab,setTab]=useState("login");
  const[form,setForm]=useState({username:"",password:"",displayName:""});
  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=async e=>{
    e.preventDefault();setError("");setLoading(true);
    await new Promise(r=>setTimeout(r,300));
    const res=tab==="login"?auth.login(form.username,form.password):auth.signup(form.username,form.password,form.displayName);
    if(!res.success)setError(res.error);
    setLoading(false);
  };
  const inp={width:"100%",padding:"12px 14px",border:`2px solid ${P.creamDark}`,borderRadius:12,fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit",color:P.noir,background:"white"};
  const lab={fontSize:11,fontWeight:700,color:P.muted,textTransform:"uppercase",letterSpacing:1.2,display:"block",marginBottom:6};
  return(
    <div style={{minHeight:"100vh",background:P.cream,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Cormorant Garamond',Georgia,serif"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <img src={LOGO_SRC} alt="Fitsy" style={{height:80,objectFit:"contain",marginBottom:8}}/>
          <p style={{color:P.muted,fontSize:15,margin:0,fontStyle:"italic"}}>Let your closet do the work.</p>
        </div>
        <div style={{background:"white",borderRadius:24,padding:"28px",boxShadow:"0 20px 60px rgba(68,33,42,0.1)"}}>
          <div style={{display:"flex",marginBottom:24,background:P.cream,borderRadius:12,padding:4}}>
            {["login","signup"].map(t=><button key={t} onClick={()=>{setTab(t);setError("");}} style={{flex:1,padding:"10px 0",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:tab===t?700:400,background:tab===t?"white":"transparent",color:tab===t?P.brown:P.muted,boxShadow:tab===t?"0 2px 8px rgba(68,33,42,0.1)":"none"}}>{t==="login"?"Sign In":"Create Account"}</button>)}
          </div>
          <form onSubmit={submit}>
            {tab==="signup"&&<div style={{marginBottom:15}}><label style={lab}>Display Name</label><input value={form.displayName} onChange={e=>set("displayName",e.target.value)} placeholder="e.g. Zaynah" required style={inp}/></div>}
            <div style={{marginBottom:15}}><label style={lab}>Username</label><input value={form.username} onChange={e=>set("username",e.target.value)} placeholder="e.g. zaynah_k" required style={inp}/></div>
            <div style={{marginBottom:20}}><label style={lab}>Password</label><input type="password" value={form.password} onChange={e=>set("password",e.target.value)} placeholder="••••••••" required style={inp}/></div>
            {error&&<div style={{color:"#c0392b",fontSize:13,marginBottom:14,padding:"10px 14px",background:"#FDEDEC",borderRadius:8}}>{error}</div>}
            <button type="submit" disabled={loading} style={{width:"100%",padding:"14px",background:P.brown,border:"none",borderRadius:14,color:"white",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:loading?.7:1}}>
              {loading?"…":tab==="login"?"Enter Fitsy →":"Join Fitsy →"}
            </button>
          </form>
        </div>
        <p style={{textAlign:"center",color:P.muted,fontSize:12,marginTop:16}}>Private · Up to 50 members</p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function App(){
  const auth=useAuth();
  const{wardrobe,addItem,removeItem,updateItem}=useWardrobe(auth.user?.id);
  const[view,setView]=useState("wardrobe");
  const[showForm,setShowForm]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[bucketId,setBucketId]=useState(STYLE_BUCKETS[0].id);
  const[outfits,setOutfits]=useState([]);
  const[generating,setGenerating]=useState(false);
  const[catFilter,setCatFilter]=useState("All");

  const generate=async()=>{
    setGenerating(true);
    await new Promise(r=>setTimeout(r,600));
    setOutfits(generateOutfits(wardrobe,bucketId,8));
    setGenerating(false);
  };
  useEffect(()=>{if(view==="outfits"&&wardrobe.length>0)generate();},[bucketId,view]);

  const handleEdit=item=>{setEditItem(item);setShowForm(true);};
  const handleSave=formData=>{if(editItem){updateItem(editItem.id,formData);setEditItem(null);}else addItem(formData);};
  const closeForm=()=>{setShowForm(false);setEditItem(null);};

  if(auth.loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cormorant Garamond',Georgia,serif",color:P.muted,background:P.cream}}>Loading…</div>;
  if(!auth.user)return<AuthScreen auth={auth}/>;

  const allCats=["All",...CATEGORIES];
  const filtered=catFilter==="All"?wardrobe:wardrobe.filter(i=>i.category===catFilter);
  const catCounts=CATEGORIES.reduce((a,c)=>({...a,[c]:wardrobe.filter(i=>i.category===c).length}),{});
  const navBtn=v=>({padding:"10px 18px",border:"none",background:view===v?P.brown:"transparent",color:view===v?"white":P.muted,borderRadius:20,cursor:"pointer",fontSize:14,fontWeight:view===v?700:400,fontFamily:"'Cormorant Garamond',Georgia,serif",transition:"all .2s"});

  return(
    <div style={{minHeight:"100vh",background:P.cream,fontFamily:"'Cormorant Garamond',Georgia,serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
      {/* NAV */}
      <div style={{background:"white",borderBottom:`1px solid ${P.blush}`,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(68,33,42,0.06)"}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 20px",height:64,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <img src={LOGO_SRC} alt="Fitsy" style={{height:38,objectFit:"contain"}}/>
          <nav style={{display:"flex",gap:4,background:P.cream,borderRadius:24,padding:4}}>
            <button style={navBtn("wardrobe")} onClick={()=>setView("wardrobe")}>👗 Wardrobe</button>
            <button style={navBtn("outfits")} onClick={()=>setView("outfits")}>✨ Outfits</button>
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:P.brown,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:14}}>{auth.user.avatar}</div>
            <button onClick={auth.logout} style={{background:"none",border:"none",color:P.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Sign out</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 20px"}}>
        {/* WARDROBE */}
        {view==="wardrobe"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:12,marginBottom:28}}>
            <div style={{background:"white",borderRadius:16,padding:"16px 18px",border:`1px solid ${P.blush}`,boxShadow:"0 2px 8px rgba(68,33,42,0.05)"}}>
              <div style={{fontSize:28,fontWeight:700,color:P.brown}}>{wardrobe.length}</div>
              <div style={{fontSize:12,color:P.muted}}>Total Pieces</div>
            </div>
            {CATEGORIES.slice(0,5).map(c=><div key={c} style={{background:"white",borderRadius:16,padding:"16px 18px",border:`1px solid ${P.blush}`,boxShadow:"0 2px 8px rgba(68,33,42,0.05)"}}>
              <div style={{fontSize:28,fontWeight:700,color:P.brown}}>{catCounts[c]||0}</div>
              <div style={{fontSize:12,color:P.muted}}>{c}s</div>
            </div>)}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {allCats.map(c=><button key={c} onClick={()=>setCatFilter(c)} style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid",borderColor:catFilter===c?P.brown:P.creamDark,background:catFilter===c?P.brown:P.cream,color:catFilter===c?"white":P.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{c}{c!=="All"&&catCounts[c]?` (${catCounts[c]})`:""}</button>)}
            </div>
            <button onClick={()=>{setEditItem(null);setShowForm(true);}} style={{padding:"10px 20px",background:P.brown,border:"none",borderRadius:20,color:"white",fontSize:14,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>+ Add Item</button>
          </div>
          {filtered.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:P.muted}}>
              <div style={{fontSize:64,marginBottom:16}}>{wardrobe.length===0?"👗":"🔍"}</div>
              <h3 style={{fontSize:22,color:P.brown,marginBottom:8}}>{wardrobe.length===0?"Your closet is empty":"Nothing here yet"}</h3>
              <p style={{fontSize:14,marginBottom:24}}>{wardrobe.length===0?"Start adding your pieces to generate outfit combinations.":"Try a different category filter."}</p>
              {wardrobe.length===0&&<button onClick={()=>setShowForm(true)} style={{padding:"12px 28px",background:P.brown,border:"none",borderRadius:20,color:"white",fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>Add your first piece →</button>}
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(162px,1fr))",gap:14}}>
              {filtered.map(item=><WardrobeCard key={item.id} item={item} onRemove={removeItem} onEdit={handleEdit}/>)}
            </div>
          )}
        </>}
        {/* OUTFITS */}
        {view==="outfits"&&<>
          <h2 style={{fontSize:26,color:P.brown,marginTop:0,marginBottom:6}}>Outfit Generator</h2>
          <p style={{color:P.muted,fontSize:14,marginBottom:24}}>Pick a style mood — only outfits that truly fit that aesthetic will appear.</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24}}>
            {STYLE_BUCKETS.map(b=><button key={b.id} onClick={()=>setBucketId(b.id)} style={{padding:"9px 15px",borderRadius:20,border:"2px solid",borderColor:bucketId===b.id?b.color:P.creamDark,background:bucketId===b.id?b.bg:P.cream,color:bucketId===b.id?b.color:P.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:bucketId===b.id?700:400,display:"flex",alignItems:"center",gap:6}}>
              <span>{b.emoji}</span>{b.name}
            </button>)}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22,flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontWeight:700,color:P.brown,fontSize:16}}>{STYLE_BUCKETS.find(b=>b.id===bucketId)?.emoji} {STYLE_BUCKETS.find(b=>b.id===bucketId)?.name}</div>
              <div style={{color:P.muted,fontSize:13}}>{STYLE_BUCKETS.find(b=>b.id===bucketId)?.description}</div>
            </div>
            <button onClick={generate} disabled={generating||wardrobe.length<2} style={{padding:"10px 24px",background:generating?P.creamDark:P.brown,border:"none",borderRadius:20,color:generating?P.muted:"white",fontSize:14,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
              {generating?"Styling…":"🔄 Regenerate"}
            </button>
          </div>
          {wardrobe.length<2?(
            <div style={{textAlign:"center",padding:"60px 20px",background:"white",borderRadius:20,border:`1px solid ${P.blush}`}}>
              <div style={{fontSize:48,marginBottom:12}}>👗</div>
              <h3 style={{color:P.brown}}>Add more pieces first</h3>
              <p style={{color:P.muted,fontSize:14}}>You need at least a top + bottom (or a dress) to generate outfits.</p>
              <button onClick={()=>setView("wardrobe")} style={{padding:"10px 22px",background:P.brown,border:"none",borderRadius:16,color:"white",fontSize:14,cursor:"pointer",fontFamily:"inherit",marginTop:12}}>→ Go to Wardrobe</button>
            </div>
          ):outfits.length===0&&!generating?(
            <div style={{textAlign:"center",padding:"60px 20px",background:"white",borderRadius:20,border:`1px solid ${P.blush}`}}>
              <div style={{fontSize:48,marginBottom:12}}>🚫</div>
              <h3 style={{color:P.brown}}>No matching outfits</h3>
              <p style={{color:P.muted,fontSize:14}}>None of your items are eligible for the <strong>{STYLE_BUCKETS.find(b=>b.id===bucketId)?.name}</strong> aesthetic. Add pieces that fit this style!</p>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:18}}>
              {generating?Array(4).fill(0).map((_,i)=><div key={i} style={{background:"white",borderRadius:20,height:200,border:`1px solid ${P.blush}`,opacity:.5}}/>):outfits.map(o=><OutfitCard key={o.id} outfit={o}/>)}
            </div>
          )}
        </>}
      </div>
      {showForm&&<ItemForm initialData={editItem} onSave={handleSave} onClose={closeForm} mode={editItem?"edit":"add"}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
